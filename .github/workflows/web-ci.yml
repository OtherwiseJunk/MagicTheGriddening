name: Web CI

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "packages/**"
  pull_request:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "packages/**"

defaults:
  run:
    working-directory: apps/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run fmt:check
      - run: npm run build --if-present
      - run: npm test --if-present

  docker-smoke:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: griddening
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/griddening

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build production Docker image
        run: docker build -t magicthegriddening -f dockerfile .
      - name: Run Prisma migrations
        run: npx prisma migrate deploy
      - name: Seed test data
        run: PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d griddening < e2e/seed.sql
      - name: Start app
        run: |
          docker run -d --name mtg-smoke --network host \
            -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/griddening \
            -e OVERRIDE_DATE=20260101 \
            magicthegriddening
      - name: Verify API responds with game data
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/gameState/smoke-test 2>/dev/null || echo "000")
            [ "$STATUS" = "200" ] && break
            sleep 2
          done
          echo "API responded with status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            docker logs mtg-smoke
            exit 1
          fi
      - name: Tear down
        if: always()
        run: docker rm -f mtg-smoke 2>/dev/null || true

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: griddening_e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/griddening_e2e
      OVERRIDE_DATE: "20260101"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
      - name: Seed test data
        run: PGPASSWORD=postgres psql -h localhost -p 5433 -U postgres -d griddening_e2e < e2e/seed.sql
      - name: Run e2e tests
        run: npm run e2e
