services:
  postgres:
    container_name: mtg-db
    image: postgres:17-alpine
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: griddening
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    container_name: mtg-migrate
    build:
      context: ./apps/seeder
      dockerfile: dockerfile
    entrypoint: ["npx", "prisma", "db", "push", "--accept-data-loss"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/griddening
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    container_name: mtg-web
    build:
      context: ./apps/web
      dockerfile: dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/griddening
      BULK_DATA_DIR: /app/data
    ports:
      - "3001:3000"
    volumes:
      - card-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  seeder:
    container_name: mtg-seeder
    build:
      context: ./apps/seeder
      dockerfile: dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/griddening
      TZ: ${TZ:-America/New_York}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-30 00 * * *}
      BULK_DATA_DIR: /app/data
    volumes:
      - card-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

#

volumes:
  postgres-volume:
  card-data:
