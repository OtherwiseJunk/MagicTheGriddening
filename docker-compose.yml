services:
  postgres:
    container_name: mtg-db
    image: postgres:17-alpine
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: griddening
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: mtg-web
    build:
      context: ./apps/web
      dockerfile: dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/griddening
      BULK_DATA_DIR: /app/data
    ports:
      - "3000:3000"
    volumes:
      - card-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  seeder:
    container_name: mtg-seeder
    build:
      context: ./apps/seeder
      dockerfile: dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/griddening
      TZ: ${TZ:-America/New_York}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-30 00 * * *}
    depends_on:
      postgres:
        condition: service_healthy

  bsky-bot:
    container_name: mtg-bsky-bot
    build:
      context: ./apps/bsky-bot
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      BLUESKY_USERNAME: ${BLUESKY_USERNAME}
      BLUESKY_PASSWORD: ${BLUESKY_PASSWORD}
      TZ: ${TZ:-America/New_York}

volumes:
  postgres-volume:
  card-data:
